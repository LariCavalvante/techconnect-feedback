  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #141466;
      --navy2:  #1a1666;
      --gold:   #f4ae07;
      --white:  #ffffff;
      --text:   #e8e8f0;
      --dark:   #141414;
    }

    body {
      background-color: var(--navy);
      color: var(--white);
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background-color: var(--dark);
      display: flex;
      justify-content: center;
      padding: 18px 20px;
    }

    header img {
      height: 40px;
      width: auto;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(160deg, #141466 0%, #1a1666 60%, #0d0d44 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 20px 50px;
      flex: 1;
      justify-content: center;
    }

    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .check-circle svg {
      width: 38px;
      height: 38px;
    }

    .hero h1 {
      font-family: 'Ubuntu', sans-serif;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      max-width: 620px;
      margin-bottom: 18px;
    }

    .hero h1 span {
      color: var(--gold);
    }

    .hero p {
      font-size: clamp(15px, 2.5vw, 17px);
      color: var(--text);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── BOTÃO PRINCIPAL ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background-color: var(--gold);
      color: var(--navy2);
      font-family: 'Ubuntu', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 8px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(244, 174, 7, 0.35);
    }

    .btn-primary:hover {
      background-color: #ffc01a;
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      background-color: var(--dark);
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #888;
    }

    footer a { color: #888; text-decoration: none; }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .hero { padding: 44px 16px 40px; }
      .btn-primary { font-size: 16px; padding: 14px 24px; }
    }
